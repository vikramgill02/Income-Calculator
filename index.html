<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Income Dashboard</title>
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Income" />
<meta name="theme-color" content="#09090b" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js"></script>
<style>
html, body { margin: 0; padding: 0; background: #09090b; }
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
::-webkit-scrollbar { height: 8px; width: 8px; }
::-webkit-scrollbar-track { background: #18181b; }
::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }

.dash-stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 16px;
  margin-bottom: 32px;
}
.dash-pie-grid {
  display: grid;
  grid-template-columns: minmax(280px, 380px) 1fr;
  gap: 24px;
  margin-bottom: 32px;
}
.dash-employers {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 16px;
}
@media (max-width: 820px) {
  .dash-pie-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useCallback, useRef } = React;

const fmt = (n) =>
  n.toLocaleString("en-US", { style: "currency", currency: "USD", minimumFractionDigits: 2 });
const fmt0 = (n) =>
  n.toLocaleString("en-US", { style: "currency", currency: "USD", maximumFractionDigits: 0 });

const n = (v) => parseFloat(v) || 0;

const EMPLOYERS = ["CCMC", "NorthBay", "Sutter"];

const EMPLOYER_META = {
  CCMC:     { color: "#7a2230", logo: "logos/ccmc.png",     full: "Community Medical Centers" },
  NorthBay: { color: "#00873e", logo: "logos/northbay.jpg", full: "NorthBay Healthcare" },
  Sutter:   { color: "#1aa39b", logo: "logos/sutter.png",   full: "Sutter Health" },
};

const colorFor = (emp) => EMPLOYER_META[emp]?.color || "#a3e635";

const formatPayDate = (iso) => {
  if (!iso) return "—";
  const [y, m, d] = iso.split("-");
  if (!y || !m || !d) return iso;
  const dt = new Date(Number(y), Number(m) - 1, Number(d));
  return dt.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
};

/* ─── shared bits ─── */

function Field({ label, value, onChange, suffix = "", placeholder = "—" }) {
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
      <span style={{ fontSize: 10, letterSpacing: "0.14em", textTransform: "uppercase", color: "#a1a1aa" }}>{label}</span>
      <div style={{ display: "flex", alignItems: "center", borderBottom: "1px solid #52525b", paddingBottom: 8 }}>
        <input type="number" step="0.01" value={value} placeholder={placeholder} onChange={onChange}
          style={{ background: "transparent", border: "none", outline: "none", color: "#ffffff", fontFamily: "'DM Mono', monospace", fontSize: 18, width: "100%" }} />
        {suffix && <span style={{ color: "#a1a1aa", fontSize: 13, marginLeft: 4 }}>{suffix}</span>}
      </div>
    </div>
  );
}

function Line({ label, value, highlight = false, muted = false, large = false, note = "" }) {
  return (
    <div style={{
      display: "flex", justifyContent: "space-between", alignItems: "baseline",
      padding: large ? "18px 0 0" : "9px 0",
      borderTop: large ? "1px solid #52525b" : "none",
    }}>
      <div style={{ display: "flex", alignItems: "baseline", gap: 8 }}>
        <span style={{ fontSize: 11, letterSpacing: "0.13em", textTransform: "uppercase", color: muted ? "#71717a" : "#d4d4d8" }}>{label}</span>
        {note && <span style={{ fontSize: 10, color: "#71717a", fontFamily: "'DM Mono', monospace" }}>{note}</span>}
      </div>
      <span style={{ fontFamily: "'DM Mono', monospace", fontSize: large ? 26 : 15, fontWeight: large ? 500 : 400, color: highlight ? "#a3e635" : muted ? "#71717a" : "#e4e4e7" }}>{value}</span>
    </div>
  );
}

/* ─── tab bar ─── */

function TabBar({ view, setView }) {
  return (
    <div style={{ display: "flex", justifyContent: "center", gap: 6, padding: "20px 24px 0" }}>
      {[["calc", "Pay Calc"], ["dash", "Dashboard"]].map(([key, label]) => {
        const active = view === key;
        return (
          <button key={key} onClick={() => setView(key)} style={{
            background: active ? "#27272a" : "transparent",
            border: `1px solid ${active ? "#52525b" : "#27272a"}`,
            borderRadius: 8, padding: "8px 18px", cursor: "pointer",
            fontSize: 10, letterSpacing: "0.16em", textTransform: "uppercase",
            color: active ? "#e4e4e7" : "#52525b", fontFamily: "'DM Mono', monospace",
          }}>{label}</button>
        );
      })}
    </div>
  );
}

/* ─── Pay Calc (unchanged) ─── */

function useHistory(initial) {
  const [history, setHistory] = useState([initial]);
  const [cursor, setCursor] = useState(0);
  const state = history[cursor];
  const set = useCallback((updater) => {
    setHistory((prev) => {
      const next = typeof updater === "function" ? updater(prev[cursor]) : updater;
      return [...prev.slice(0, cursor + 1), next];
    });
    setCursor((c) => c + 1);
  }, [cursor]);
  const undo = useCallback(() => setCursor((c) => Math.max(0, c - 1)), []);
  const redo = useCallback(() => setCursor((c) => Math.min(history.length - 1, c + 1)), [history.length]);
  return { state, set, undo, redo, canUndo: cursor > 0, canRedo: cursor < history.length - 1 };
}

const CALC_INIT = { night: false, d1: "", otd1: "", d2: "", deductions: 35, useHours1: false, useHours2: false };
const SUTTER_BASE = 76.40, NIGHT_DIFF = 6.00, SUTTER_OT = 114.60;
const NORTHBAY_RATE = 87.40, HOURS_PER_DAY = 12, NORTHBAY_HRS = 8;

function Calc() {
  const { state, set, undo, redo, canUndo, canRedo } = useHistory(CALC_INIT);
  const { night, d1, otd1, d2, deductions, useHours1, useHours2 } = state;
  const update = (key) => (e) => set((s) => ({ ...s, [key]: e.target.value }));
  const toggleNight  = () => set((s) => ({ ...s, night: !s.night }));
  const toggleHours1 = () => set((s) => ({ ...s, useHours1: !s.useHours1, d1: "", otd1: "" }));
  const toggleHours2 = () => set((s) => ({ ...s, useHours2: !s.useHours2, d2: "" }));

  const dayRate   = SUTTER_BASE + (night ? NIGHT_DIFF : 0);
  const dayPay    = dayRate * HOURS_PER_DAY;
  const otDayPay  = SUTTER_OT * HOURS_PER_DAY;
  const gross1    = useHours1 ? n(d1) * dayRate + n(otd1) * SUTTER_OT : n(d1) * dayPay + n(otd1) * otDayPay;
  const gross2    = useHours2 ? n(d2) * NORTHBAY_RATE : n(d2) * NORTHBAY_RATE * NORTHBAY_HRS;
  const totalGross = gross1 + gross2;
  const dedPct    = n(deductions);
  const dedAmt    = totalGross * (dedPct / 100);
  const totalNet  = totalGross - dedAmt;
  const hasData   = totalGross > 0;
  const iconColor = (active) => active ? "#d4d4d8" : "#52525b";

  return (
    <div style={{ display: "flex", justifyContent: "center", padding: "28px 24px 48px" }}>
      <div style={{ width: "100%", maxWidth: 420 }}>

        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 52 }}>
          <div>
            <p style={{ fontFamily: "'Instrument Serif', serif", fontStyle: "italic", fontSize: 12, color: "#a1a1aa", letterSpacing: "0.06em", margin: "0 0 4px" }}>monthly</p>
            <h1 style={{ fontFamily: "'Instrument Serif', serif", fontSize: 38, fontWeight: 400, margin: 0, color: "#fff", lineHeight: 1.05 }}>Pay Calculator</h1>
          </div>
          <div style={{ display: "flex", gap: 6, marginTop: 8 }}>
            {[
              { fn: undo, can: canUndo, d: "M3 7v6h6 M3 13C5 7 10 3 16 3a9 9 0 0 1 0 18H3" },
              { fn: redo, can: canRedo, d: "M21 7v6h-6 M21 13C19 7 14 3 8 3a9 9 0 0 0 0 18h13" },
            ].map(({ fn, can, d }, i) => (
              <button key={i} onClick={fn} disabled={!can} style={{
                background: "transparent", border: `1px solid ${can ? "#52525b" : "#27272a"}`,
                borderRadius: 8, padding: "7px 10px", cursor: can ? "pointer" : "not-allowed",
                display: "flex", alignItems: "center", justifyContent: "center",
              }}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={iconColor(can)} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  {d.split(" M").map((seg, j) => <path key={j} d={(j === 0 ? "" : "M") + seg} />)}
                </svg>
              </button>
            ))}
          </div>
        </div>

        <div style={{ marginBottom: 40 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 20 }}>
            <div>
              <p style={{ fontSize: 10, letterSpacing: "0.16em", textTransform: "uppercase", color: "#a1a1aa", margin: "0 0 6px" }}>Job 01 · Sutter</p>
              <p style={{ fontFamily: "'DM Mono', monospace", fontSize: 11, color: "#71717a", margin: 0, lineHeight: 2 }}>
                <span style={{ color: "#e4e4e7" }}>{fmt(dayRate)}/hr</span>
                <span style={{ margin: "0 10px", color: "#3f3f46" }}>·</span>
                <span style={{ color: "#a1a1aa" }}>{fmt(dayPay)}/day</span>
                <br />
                <span style={{ color: "#a1a1aa" }}>OT </span>
                <span style={{ color: "#e4e4e7" }}>{fmt(SUTTER_OT)}/hr</span>
                <span style={{ margin: "0 10px", color: "#3f3f46" }}>·</span>
                <span style={{ color: "#a1a1aa" }}>{fmt(otDayPay)}/day</span>
              </p>
            </div>
            <button onClick={toggleNight} style={{
              display: "flex", alignItems: "center", gap: 7,
              background: night ? "rgba(251,146,60,0.12)" : "transparent",
              border: `1px solid ${night ? "#fb923c" : "#52525b"}`,
              borderRadius: 20, padding: "6px 13px", cursor: "pointer",
            }}>
              <div style={{ width: 6, height: 6, borderRadius: "50%", background: night ? "#fb923c" : "#71717a" }} />
              <span style={{ fontSize: 10, letterSpacing: "0.13em", textTransform: "uppercase", color: night ? "#fb923c" : "#a1a1aa", fontFamily: "'DM Mono', monospace" }}>Night</span>
            </button>
          </div>
          <div style={{ display: "flex", gap: 4, marginBottom: 20 }}>
            {["Days", "Hours"].map((mode) => {
              const active = (mode === "Hours") === useHours1;
              return (
                <button key={mode} onClick={toggleHours1} style={{
                  background: active ? "#27272a" : "transparent",
                  border: `1px solid ${active ? "#52525b" : "#27272a"}`,
                  borderRadius: 6, padding: "4px 12px", cursor: "pointer",
                  fontSize: 10, letterSpacing: "0.12em", textTransform: "uppercase",
                  color: active ? "#e4e4e7" : "#52525b", fontFamily: "'DM Mono', monospace",
                }}>{mode}</button>
              );
            })}
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 24 }}>
            <Field label={useHours1 ? "Hours Worked" : "Days Worked"} value={d1} onChange={update("d1")} />
            <Field label={useHours1 ? "OT Hours" : "OT Days"} value={otd1} onChange={update("otd1")} />
          </div>
        </div>

        <div style={{ borderTop: "1px solid #27272a", marginBottom: 40 }} />

        <div style={{ marginBottom: 40 }}>
          <div style={{ marginBottom: 20 }}>
            <p style={{ fontSize: 10, letterSpacing: "0.16em", textTransform: "uppercase", color: "#a1a1aa", margin: "0 0 6px" }}>Job 02 · NorthBay</p>
            <p style={{ fontFamily: "'DM Mono', monospace", fontSize: 11, color: "#71717a", margin: 0 }}>
              <span style={{ color: "#e4e4e7" }}>{fmt(NORTHBAY_RATE)}/hr</span>
              <span style={{ margin: "0 10px", color: "#3f3f46" }}>·</span>
              <span style={{ color: "#a1a1aa" }}>{fmt(NORTHBAY_RATE * NORTHBAY_HRS)}/day</span>
            </p>
          </div>
          <div style={{ display: "flex", gap: 4, marginBottom: 20 }}>
            {["Days", "Hours"].map((mode) => {
              const active = (mode === "Hours") === useHours2;
              return (
                <button key={mode} onClick={toggleHours2} style={{
                  background: active ? "#27272a" : "transparent",
                  border: `1px solid ${active ? "#52525b" : "#27272a"}`,
                  borderRadius: 6, padding: "4px 12px", cursor: "pointer",
                  fontSize: 10, letterSpacing: "0.12em", textTransform: "uppercase",
                  color: active ? "#e4e4e7" : "#52525b", fontFamily: "'DM Mono', monospace",
                }}>{mode}</button>
              );
            })}
          </div>
          <div style={{ maxWidth: 160 }}>
            <Field label={useHours2 ? "Hours Worked" : "Days Worked"} value={d2} onChange={update("d2")} />
          </div>
        </div>

        <div style={{ borderTop: "1px solid #27272a", marginBottom: 40 }} />

        <div style={{ marginBottom: 52 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 20 }}>
            <p style={{ fontSize: 10, letterSpacing: "0.16em", textTransform: "uppercase", color: "#a1a1aa", margin: 0 }}>Deductions</p>
            <span style={{ fontFamily: "'DM Mono', monospace", fontSize: 18, color: "#fff" }}>{deductions}%</span>
          </div>
          <style>{`
            input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
            input[type=range]::-webkit-slider-runnable-track { height: 2px; background: #27272a; border-radius: 2px; }
            input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #fff; margin-top: -8px; cursor: pointer; }
            input[type=range]::-moz-range-track { height: 2px; background: #27272a; border-radius: 2px; }
            input[type=range]::-moz-range-thumb { width: 18px; height: 18px; border-radius: 50%; background: #fff; border: none; cursor: pointer; }
          `}</style>
          <input type="range" min="25" max="50" step="1" value={deductions}
            onChange={(e) => set((s) => ({ ...s, deductions: Number(e.target.value) }))} />
          <div style={{ display: "flex", justifyContent: "space-between", marginTop: 8 }}>
            <span style={{ fontSize: 10, color: "#52525b", fontFamily: "'DM Mono', monospace" }}>25%</span>
            <span style={{ fontSize: 10, color: "#52525b", fontFamily: "'DM Mono', monospace" }}>50%</span>
          </div>
        </div>

        {hasData ? (
          <div>
            <Line label="Sutter Gross" value={fmt(gross1)} note={night ? "(night)" : ""} />
            <Line label="NorthBay Gross" value={fmt(gross2)} />
            <Line label="Total Gross" value={fmt(totalGross)} />
            {dedPct > 0 && <Line label="Deductions" value={`− ${fmt(dedAmt)}`} muted />}
            <Line label="Take Home" value={fmt(totalNet)} highlight large />
          </div>
        ) : (
          <p style={{ fontFamily: "'Instrument Serif', serif", fontStyle: "italic", color: "#52525b", fontSize: 15, margin: 0 }}>
            Enter your days above to see totals.
          </p>
        )}
      </div>
    </div>
  );
}

/* ─── Dashboard widgets ─── */

function Logo({ employer, size = 40 }) {
  const meta = EMPLOYER_META[employer];
  const [errored, setErrored] = useState(false);
  if (!meta || !meta.logo || errored) {
    return (
      <div style={{
        width: size, height: size, borderRadius: 10,
        background: colorFor(employer), color: "#fff",
        display: "flex", alignItems: "center", justifyContent: "center",
        fontFamily: "'DM Mono', monospace", fontSize: size * 0.36, fontWeight: 600, flexShrink: 0,
      }}>{employer.slice(0, 1)}</div>
    );
  }
  return (
    <div style={{
      width: size, height: size, borderRadius: 10, overflow: "hidden",
      background: "#fff", flexShrink: 0,
      display: "flex", alignItems: "center", justifyContent: "center",
    }}>
      <img src={meta.logo} alt={meta.full}
        onError={() => setErrored(true)}
        style={{ width: "82%", height: "82%", objectFit: "contain" }} />
    </div>
  );
}

function StatCard({ label, value, sub, accent }) {
  return (
    <div style={{
      background: "linear-gradient(180deg, #18181b 0%, #09090b 100%)",
      border: "1px solid #27272a", borderRadius: 16, padding: "22px 24px",
      position: "relative", overflow: "hidden",
    }}>
      <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: 2, background: accent }} />
      <div style={{ fontSize: 10, letterSpacing: "0.16em", textTransform: "uppercase", color: "#a1a1aa", marginBottom: 12 }}>{label}</div>
      <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 32, fontWeight: 500, color: accent, lineHeight: 1.05, letterSpacing: "-0.01em" }}>{value}</div>
      {sub && <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 11, color: "#71717a", marginTop: 10 }}>{sub}</div>}
    </div>
  );
}

function PieChart({ data, size = 240 }) {
  const total = data.reduce((s, d) => s + d.value, 0);
  if (total === 0) {
    return (
      <div style={{ textAlign: "center", color: "#52525b", fontFamily: "'Instrument Serif', serif", fontStyle: "italic", padding: "40px 0" }}>
        No data
      </div>
    );
  }
  const cx = size / 2, cy = size / 2, r = size / 2 - 4, innerR = r * 0.58;
  let cum = -Math.PI / 2;
  const slices = data.map((d) => {
    const angle = (d.value / total) * Math.PI * 2;
    const a1 = cum, a2 = cum + angle;
    cum = a2;
    const large = angle > Math.PI ? 1 : 0;
    const x1 = cx + r * Math.cos(a1), y1 = cy + r * Math.sin(a1);
    const x2 = cx + r * Math.cos(a2), y2 = cy + r * Math.sin(a2);
    const xi1 = cx + innerR * Math.cos(a1), yi1 = cy + innerR * Math.sin(a1);
    const xi2 = cx + innerR * Math.cos(a2), yi2 = cy + innerR * Math.sin(a2);
    const path = `M ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} L ${xi2} ${yi2} A ${innerR} ${innerR} 0 ${large} 0 ${xi1} ${yi1} Z`;
    return { path, color: d.color, label: d.label, value: d.value, pct: (d.value / total) * 100 };
  });

  return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center" }}>
      <svg width={size} height={size}>
        {slices.map((s, i) => (
          <path key={i} d={s.path} fill={s.color} stroke="#09090b" strokeWidth="2" />
        ))}
        <text x={cx} y={cy - 4} textAnchor="middle" style={{ fill: "#a1a1aa", fontSize: 9, letterSpacing: "0.16em", fontFamily: "'DM Mono', monospace" }}>YTD GROSS</text>
        <text x={cx} y={cy + 22} textAnchor="middle" style={{ fill: "#fff", fontSize: 22, fontFamily: "'DM Mono', monospace", fontWeight: 500 }}>{fmt0(total)}</text>
      </svg>
      <div style={{ marginTop: 24, display: "flex", flexDirection: "column", gap: 10, width: "100%" }}>
        {slices.map((s, i) => (
          <div key={i} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <span style={{ width: 10, height: 10, borderRadius: 3, background: s.color }} />
              <span style={{ fontSize: 11, letterSpacing: "0.12em", textTransform: "uppercase", color: "#d4d4d8", fontFamily: "'DM Mono', monospace" }}>{s.label}</span>
            </div>
            <div style={{ display: "flex", gap: 12, alignItems: "baseline" }}>
              <span style={{ fontFamily: "'DM Mono', monospace", fontSize: 12, color: "#e4e4e7" }}>{fmt0(s.value)}</span>
              <span style={{ fontFamily: "'DM Mono', monospace", fontSize: 11, color: "#71717a", minWidth: 44, textAlign: "right" }}>{s.pct.toFixed(1)}%</span>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function EmployerCard({ employer, stats }) {
  const meta = EMPLOYER_META[employer] || {};
  const color = meta.color || "#a3e635";
  return (
    <div style={{
      background: "linear-gradient(180deg, #18181b 0%, #09090b 100%)",
      border: "1px solid #27272a",
      borderLeft: `3px solid ${color}`,
      borderRadius: 16, padding: 22,
    }}>
      <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 20 }}>
        <Logo employer={employer} size={44} />
        <div style={{ minWidth: 0 }}>
          <div style={{ fontFamily: "'Instrument Serif', serif", fontSize: 22, color: "#fff", lineHeight: 1 }}>{employer}</div>
          <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, letterSpacing: "0.1em", color: "#71717a", textTransform: "uppercase", marginTop: 4, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{meta.full || employer}</div>
        </div>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, rowGap: 16 }}>
        <div>
          <div style={{ fontSize: 9, letterSpacing: "0.16em", textTransform: "uppercase", color: "#71717a", marginBottom: 4 }}>Gross</div>
          <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 18, color: "#e4e4e7" }}>{fmt(stats.gross)}</div>
        </div>
        <div>
          <div style={{ fontSize: 9, letterSpacing: "0.16em", textTransform: "uppercase", color: "#71717a", marginBottom: 4 }}>Net</div>
          <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 18, color: "#e4e4e7" }}>{fmt(stats.net)}</div>
        </div>
        <div>
          <div style={{ fontSize: 9, letterSpacing: "0.16em", textTransform: "uppercase", color: "#71717a", marginBottom: 4 }}>403(b)</div>
          <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 14, color: "#a78bfa" }}>{fmt(stats.r403b)}</div>
        </div>
        <div>
          <div style={{ fontSize: 9, letterSpacing: "0.16em", textTransform: "uppercase", color: "#71717a", marginBottom: 4 }}>Paystubs</div>
          <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 14, color: "#e4e4e7" }}>{stats.count}</div>
        </div>
      </div>
    </div>
  );
}

function ProjectionCard({ ytdGross, projection }) {
  if (!projection || !projection.monthly) return null;
  let remaining = 0;
  const byEmployer = {};
  for (const ym in projection.monthly) {
    for (const emp in projection.monthly[ym]) {
      const amt = n(projection.monthly[ym][emp]);
      remaining += amt;
      byEmployer[emp] = (byEmployer[emp] || 0) + amt;
    }
  }
  const total = ytdGross + remaining;
  const empKeys = [
    ...EMPLOYERS.filter((e) => byEmployer[e]),
    ...Object.keys(byEmployer).filter((e) => !EMPLOYERS.includes(e)),
  ];
  return (
    <div style={{
      background: "linear-gradient(135deg, #18181b 0%, #0c0c0e 100%)",
      border: "1px solid #27272a", borderRadius: 16, padding: 28,
    }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 24, flexWrap: "wrap", gap: 16 }}>
        <div>
          <div style={{ fontSize: 10, letterSpacing: "0.16em", textTransform: "uppercase", color: "#a1a1aa", marginBottom: 10 }}>2026 Year-End Projection</div>
          <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 40, color: "#a3e635", fontWeight: 500, lineHeight: 1, letterSpacing: "-0.01em" }}>{fmt(total)}</div>
          <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 11, color: "#71717a", marginTop: 10 }}>
            {fmt(ytdGross)} earned + {fmt(remaining)} projected
          </div>
        </div>
        {projection.notes && (
          <div style={{ fontFamily: "'Instrument Serif', serif", fontStyle: "italic", color: "#a1a1aa", fontSize: 13, maxWidth: 360, textAlign: "right", lineHeight: 1.5 }}>
            {projection.notes}
          </div>
        )}
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(180px, 1fr))", gap: 16 }}>
        <div style={{ borderLeft: "2px solid #52525b", paddingLeft: 14 }}>
          <div style={{ fontSize: 9, letterSpacing: "0.16em", textTransform: "uppercase", color: "#71717a", marginBottom: 6 }}>YTD Earned</div>
          <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 18, color: "#e4e4e7" }}>{fmt(ytdGross)}</div>
        </div>
        {empKeys.map((emp) => (
          <div key={emp} style={{ borderLeft: `2px solid ${colorFor(emp)}`, paddingLeft: 14 }}>
            <div style={{ fontSize: 9, letterSpacing: "0.16em", textTransform: "uppercase", color: "#71717a", marginBottom: 6 }}>Projected {emp}</div>
            <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 18, color: "#e4e4e7" }}>{fmt(byEmployer[emp])}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

const MONTH_LABELS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

function ChartTooltip({ ym, data, metric, showProjected = true, x, y, containerW }) {
  const [yearStr, monthStr] = ym.split("-");
  const monthName = MONTH_LABELS[Number(monthStr) - 1] + " " + yearStr;
  const stubs = data.stubs || [];
  const projByEmp = showProjected ? (data.projByEmp || {}) : {};
  const hasActual = stubs.length > 0;
  const hasProj = Object.keys(projByEmp).length > 0;

  let totalGross = 0, totalNet = 0;
  for (const p of stubs) {
    totalGross += n(p.gross);
    totalNet += n(p.net);
  }
  for (const emp in projByEmp) {
    totalGross += n(projByEmp[emp].gross);
    totalNet += n(projByEmp[emp].netProxy);
  }
  const totalShown = metric === "net" ? totalNet : totalGross;
  const totalColor = metric === "net" ? "#22c55e" : "#e4e4e7";

  const tipW = 280;
  let left = x + 16;
  if (containerW && left + tipW > containerW - 12) left = Math.max(8, x - tipW - 16);
  const top = Math.max(8, y - 20);

  const label = hasProj && !hasActual ? "Projected" : hasProj && hasActual ? "Partial" : "";

  return (
    <div style={{
      position: "absolute", left, top, width: tipW,
      background: "rgba(9,9,11,0.97)", border: "1px solid #3f3f46",
      borderRadius: 10, padding: "12px 14px",
      pointerEvents: "none", zIndex: 10,
      boxShadow: "0 8px 24px rgba(0,0,0,0.5)",
    }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 10, gap: 8 }}>
        <div style={{ fontSize: 11, letterSpacing: "0.14em", textTransform: "uppercase", color: "#e4e4e7", fontFamily: "'DM Mono', monospace" }}>{monthName}</div>
        {label && <div style={{ fontSize: 9, letterSpacing: "0.16em", color: "#fbbf24", fontFamily: "'DM Mono', monospace", textTransform: "uppercase" }}>{label}</div>}
      </div>

      {hasActual && (
        <div style={{ marginBottom: hasProj ? 12 : 0 }}>
          {stubs.map((p, i) => (
            <div key={i} style={{
              display: "flex", justifyContent: "space-between", alignItems: "center",
              padding: "6px 0", borderTop: i === 0 ? "none" : "1px solid #1e1e22",
              fontSize: 11, fontFamily: "'DM Mono', monospace", gap: 12,
            }}>
              <div style={{ minWidth: 0 }}>
                <div style={{ color: colorFor(p.employer), fontSize: 10, letterSpacing: "0.1em", textTransform: "uppercase" }}>{p.employer}</div>
                <div style={{ color: "#71717a", fontSize: 10, marginTop: 2 }}>{formatPayDate(p.pay_date)}</div>
              </div>
              <div style={{ color: "#e4e4e7", whiteSpace: "nowrap" }}>{fmt(metric === "net" ? n(p.net) : n(p.gross))}</div>
            </div>
          ))}
        </div>
      )}

      {hasProj && (
        <div>
          {hasActual && <div style={{ fontSize: 9, letterSpacing: "0.16em", textTransform: "uppercase", color: "#fbbf24", fontFamily: "'DM Mono', monospace", marginBottom: 6 }}>Still Projected</div>}
          {Object.keys(projByEmp).map((emp) => {
            const v = metric === "net" ? n(projByEmp[emp].netProxy) : n(projByEmp[emp].gross);
            return (
              <div key={emp} style={{ display: "flex", justifyContent: "space-between", padding: "5px 0", fontSize: 11, fontFamily: "'DM Mono', monospace" }}>
                <span style={{ color: colorFor(emp), fontSize: 10, letterSpacing: "0.1em", textTransform: "uppercase" }}>{emp}</span>
                <span style={{ color: "#e4e4e7", opacity: 0.75 }}>{fmt(v)}</span>
              </div>
            );
          })}
        </div>
      )}

      {!hasActual && !hasProj && (
        <div style={{ fontFamily: "'Instrument Serif', serif", fontStyle: "italic", color: "#71717a", fontSize: 12 }}>No paychecks this month.</div>
      )}

      <div style={{ borderTop: "1px solid #3f3f46", marginTop: 10, paddingTop: 10, display: "flex", justifyContent: "space-between", fontFamily: "'DM Mono', monospace" }}>
        <span style={{ color: "#a1a1aa", letterSpacing: "0.14em", textTransform: "uppercase", fontSize: 10 }}>Total {metric}</span>
        <span style={{ color: totalColor, fontSize: 13, fontWeight: 500 }}>{fmt(totalShown)}</span>
      </div>
    </div>
  );
}

function MonthlyChart({ paystubs, projection, year }) {
  const [metric, setMetric] = useState("gross");
  const [showProjected, setShowProjected] = useState(true);
  const [hovered, setHovered] = useState(null);
  const containerRef = useRef(null);

  const ratios = useMemo(() => {
    const r = {};
    for (const p of paystubs) {
      if (!r[p.employer]) r[p.employer] = { g: 0, n: 0 };
      r[p.employer].g += n(p.gross);
      r[p.employer].n += n(p.net);
    }
    const out = {};
    for (const e in r) out[e] = r[e].g > 0 ? r[e].n / r[e].g : 1;
    return out;
  }, [paystubs]);

  const monthly = {};
  for (let m = 1; m <= 12; m++) {
    const ym = `${year}-${String(m).padStart(2, "0")}`;
    monthly[ym] = { stubs: [], actualByEmp: {}, projByEmp: {}, hasProjection: false };
  }
  for (const p of paystubs) {
    if (!p.pay_date) continue;
    const ym = p.pay_date.slice(0, 7);
    if (!monthly[ym]) continue;
    monthly[ym].stubs.push(p);
    if (!monthly[ym].actualByEmp[p.employer]) monthly[ym].actualByEmp[p.employer] = { gross: 0, net: 0 };
    monthly[ym].actualByEmp[p.employer].gross += n(p.gross);
    monthly[ym].actualByEmp[p.employer].net += n(p.net);
  }
  if (projection && projection.monthly) {
    for (const ym in projection.monthly) {
      if (!monthly[ym]) continue;
      const mp = projection.monthly[ym];
      for (const emp in mp) {
        const projected = n(mp[emp]);
        const actualGross = (monthly[ym].actualByEmp[emp] && monthly[ym].actualByEmp[emp].gross) || 0;
        const remaining = Math.max(0, projected - actualGross);
        if (remaining > 0.01) {
          const rat = ratios[emp] != null ? ratios[emp] : 1;
          monthly[ym].projByEmp[emp] = { gross: remaining, netProxy: remaining * rat };
          monthly[ym].hasProjection = true;
        }
      }
    }
  }

  const handleHover = (ym) => (e) => {
    if (!containerRef.current) return;
    const rect = containerRef.current.getBoundingClientRect();
    setHovered({ ym, x: e.clientX - rect.left, y: e.clientY - rect.top });
  };
  const handleLeave = () => setHovered(null);
  const monthsArr = Object.keys(monthly).sort();
  const grossTotals = monthsArr.map((k) => {
    const m = monthly[k];
    let total = 0;
    for (const emp in m.actualByEmp) total += m.actualByEmp[emp].gross;
    for (const emp in m.projByEmp) total += m.projByEmp[emp].gross;
    return total;
  });
  const max = Math.max(...grossTotals, 1);
  const yMax = Math.ceil(max / 5000) * 5000 || 5000;

  const W = 800, H = 280, ML = 56, MR = 12, MT = 12, MB = 30;
  const innerW = W - ML - MR;
  const innerH = H - MT - MB;
  const slot = innerW / 12;
  const barWidth = slot * 0.62;

  const gridSteps = 4;
  const gridLines = [];
  for (let i = 0; i <= gridSteps; i++) {
    const val = (yMax / gridSteps) * i;
    const y = MT + innerH - (val / yMax) * innerH;
    gridLines.push({ val, y });
  }

  const allEmployers = [
    ...EMPLOYERS,
    ...Array.from(new Set(monthsArr.flatMap((k) => [
      ...Object.keys(monthly[k].actualByEmp),
      ...Object.keys(monthly[k].projByEmp),
    ]))).filter((e) => !EMPLOYERS.includes(e)),
  ];

  return (
    <div ref={containerRef} style={{
      background: "linear-gradient(180deg, #18181b 0%, #09090b 100%)",
      border: "1px solid #27272a", borderRadius: 16, padding: 24,
      position: "relative",
    }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16, flexWrap: "wrap", gap: 12 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 14, flexWrap: "wrap" }}>
          <div style={{ fontSize: 10, letterSpacing: "0.16em", textTransform: "uppercase", color: "#a1a1aa" }}>
            Monthly {metric === "net" ? "Net" : "Gross"} · {year}
          </div>
          <div style={{ display: "flex", gap: 2, background: "#0c0c0e", border: "1px solid #27272a", borderRadius: 8, padding: 2 }}>
            {[["gross", "Gross"], ["net", "Net"]].map(([key, label]) => {
              const active = metric === key;
              return (
                <button key={key} onClick={() => setMetric(key)} style={{
                  background: active ? (key === "net" ? "#22c55e" : "#e4e4e7") : "transparent",
                  color: active ? "#09090b" : "#71717a",
                  border: "none", borderRadius: 6, padding: "5px 12px", cursor: "pointer",
                  fontSize: 10, letterSpacing: "0.12em", textTransform: "uppercase",
                  fontFamily: "'DM Mono', monospace", fontWeight: 500,
                }}>{label}</button>
              );
            })}
          </div>
          <button onClick={() => setShowProjected((v) => !v)} style={{
            display: "flex", alignItems: "center", gap: 7,
            background: showProjected ? "rgba(251,191,36,0.1)" : "transparent",
            border: `1px solid ${showProjected ? "#fbbf24" : "#3f3f46"}`,
            borderRadius: 8, padding: "6px 12px", cursor: "pointer",
            fontSize: 10, letterSpacing: "0.14em", textTransform: "uppercase",
            color: showProjected ? "#fbbf24" : "#71717a", fontFamily: "'DM Mono', monospace",
          }}>
            <span style={{
              width: 9, height: 9, borderRadius: 2,
              background: showProjected ? "rgba(251,191,36,0.35)" : "transparent",
              border: `1px dashed ${showProjected ? "#fbbf24" : "#71717a"}`,
            }} />
            Projected
          </button>
        </div>
        <div style={{ display: "flex", gap: 14, flexWrap: "wrap" }}>
          {allEmployers.map((emp) => (
            <div key={emp} style={{ display: "flex", alignItems: "center", gap: 6 }}>
              <span style={{ width: 10, height: 10, borderRadius: 3, background: colorFor(emp) }} />
              <span style={{ fontSize: 10, letterSpacing: "0.12em", color: "#d4d4d8", textTransform: "uppercase", fontFamily: "'DM Mono', monospace" }}>{emp}</span>
            </div>
          ))}
          <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
            <span style={{ width: 10, height: 10, borderRadius: 3, background: "transparent", border: "1px dashed #71717a" }} />
            <span style={{ fontSize: 10, letterSpacing: "0.12em", color: "#71717a", textTransform: "uppercase", fontFamily: "'DM Mono', monospace" }}>Projected</span>
          </div>
        </div>
      </div>

      <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: "auto", display: "block" }}>
        {gridLines.map((g, i) => (
          <g key={i}>
            <line x1={ML} x2={W - MR} y1={g.y} y2={g.y}
              stroke="#27272a" strokeWidth="1"
              strokeDasharray={i === 0 ? "" : "2,4"} />
            <text x={ML - 8} y={g.y + 3} textAnchor="end"
              style={{ fill: "#52525b", fontSize: 9, fontFamily: "'DM Mono', monospace" }}>
              {g.val >= 1000 ? `$${(g.val / 1000).toFixed(0)}k` : `$${g.val.toFixed(0)}`}
            </text>
          </g>
        ))}
        {monthsArr.map((ym, i) => {
          const data = monthly[ym];
          const x = ML + slot * i + (slot - barWidth) / 2;
          let yCursor = MT + innerH;
          const empSet = new Set([...Object.keys(data.actualByEmp), ...Object.keys(data.projByEmp)]);
          const empOrder = [
            ...EMPLOYERS.filter((e) => empSet.has(e)),
            ...Array.from(empSet).filter((e) => !EMPLOYERS.includes(e)),
          ];
          const segments = [];
          for (const emp of empOrder) {
            const act = data.actualByEmp[emp];
            if (act) {
              const val = metric === "net" ? act.net : act.gross;
              if (val > 0) {
                const h = (val / yMax) * innerH;
                yCursor -= h;
                segments.push({ x, y: yCursor, w: barWidth, h, color: colorFor(emp), emp, isProjection: false });
              }
            }
            const proj = data.projByEmp[emp];
            if (proj && showProjected) {
              const val = metric === "net" ? proj.netProxy : proj.gross;
              if (val > 0) {
                const h = (val / yMax) * innerH;
                yCursor -= h;
                segments.push({ x, y: yCursor, w: barWidth, h, color: colorFor(emp), emp, isProjection: true });
              }
            }
          }
          const monthTotal = segments.reduce((s, seg) => s + (seg.h * yMax) / innerH, 0);
          const isHovered = hovered && hovered.ym === ym;
          const isAllProjection = data.stubs.length === 0 && data.hasProjection && showProjected;
          return (
            <g key={ym}>
              {segments.map((s, j) => (
                <rect key={j} x={s.x} y={s.y} width={s.w} height={s.h}
                  fill={s.isProjection ? `${s.color}55` : s.color}
                  stroke={s.isProjection ? s.color : "none"}
                  strokeDasharray={s.isProjection ? "3,3" : ""}
                  strokeWidth="1.5" rx="2"
                  opacity={hovered && !isHovered ? 0.45 : 1} />
              ))}
              {monthTotal > 0 && (
                <text x={x + barWidth / 2} y={MT + innerH - (monthTotal / yMax) * innerH - 6}
                  textAnchor="middle"
                  style={{ fill: isAllProjection ? "#71717a" : "#e4e4e7", fontSize: 8.5, fontFamily: "'DM Mono', monospace" }}>
                  {monthTotal >= 1000 ? `$${(monthTotal / 1000).toFixed(1)}k` : ""}
                </text>
              )}
              <text x={x + barWidth / 2} y={H - MB + 18} textAnchor="middle"
                style={{ fill: isAllProjection ? "#52525b" : "#a1a1aa", fontSize: 10, fontFamily: "'DM Mono', monospace" }}>
                {MONTH_LABELS[i]}
              </text>
              <rect x={ML + slot * i} y={MT} width={slot} height={innerH}
                fill="transparent" style={{ cursor: "pointer" }}
                onMouseEnter={handleHover(ym)}
                onMouseMove={handleHover(ym)}
                onMouseLeave={handleLeave} />
            </g>
          );
        })}
      </svg>
      {hovered && monthly[hovered.ym] && (
        <ChartTooltip ym={hovered.ym} data={monthly[hovered.ym]}
          metric={metric} showProjected={showProjected}
          x={hovered.x} y={hovered.y}
          containerW={containerRef.current ? containerRef.current.clientWidth : 800} />
      )}
    </div>
  );
}

function Dashboard() {
  const [year, setYear] = useState(new Date().getFullYear());
  const [paystubs, setPaystubs] = useState([]);
  const [projection, setProjection] = useState(null);
  const [lastUpdated, setLastUpdated] = useState("");
  const [loaded, setLoaded] = useState(false);

  useEffect(() => {
    fetch("paystubs.json", { cache: "no-store" })
      .then((r) => r.ok ? r.json() : { year: new Date().getFullYear(), paystubs: [] })
      .then((data) => {
        if (data.year) setYear(data.year);
        if (data.last_updated) setLastUpdated(data.last_updated);
        if (data.projection) setProjection(data.projection);
        setPaystubs(Array.isArray(data.paystubs) ? data.paystubs : []);
        setLoaded(true);
      })
      .catch(() => setLoaded(true));
  }, []);

  const totals = useMemo(() => {
    const out = { gross: 0, net: 0, r403b: 0, byEmployer: {} };
    for (const p of paystubs) {
      const g = n(p.gross), net = n(p.net), r = n(p.retirement_403b);
      out.gross += g; out.net += net; out.r403b += r;
      if (!out.byEmployer[p.employer]) out.byEmployer[p.employer] = { gross: 0, net: 0, r403b: 0, count: 0 };
      out.byEmployer[p.employer].gross += g;
      out.byEmployer[p.employer].net   += net;
      out.byEmployer[p.employer].r403b += r;
      out.byEmployer[p.employer].count += 1;
    }
    return out;
  }, [paystubs]);

  const orderedEmployers = useMemo(() => [
    ...EMPLOYERS.filter((e) => totals.byEmployer[e]),
    ...Object.keys(totals.byEmployer).filter((e) => !EMPLOYERS.includes(e)),
  ], [totals]);

  const pieData = useMemo(() => orderedEmployers.map((e) => ({
    label: e, value: totals.byEmployer[e].gross, color: colorFor(e),
  })), [orderedEmployers, totals]);

  const taxesOther = Math.max(0, totals.gross - totals.net - totals.r403b);

  return (
    <div style={{ padding: "28px 24px 56px" }}>
      <div style={{ maxWidth: 1280, margin: "0 auto" }}>

        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 24, marginBottom: 32, flexWrap: "wrap" }}>
          <div>
            <p style={{ fontFamily: "'Instrument Serif', serif", fontStyle: "italic", fontSize: 14, color: "#a1a1aa", margin: "0 0 6px" }}>
              year to date · {year}
            </p>
            <h1 style={{ fontFamily: "'Instrument Serif', serif", fontSize: 48, fontWeight: 400, margin: 0, color: "#fff", lineHeight: 1.05 }}>
              Income Dashboard
            </h1>
          </div>
          {lastUpdated && (
            <div style={{ textAlign: "right" }}>
              <div style={{ fontSize: 9, letterSpacing: "0.18em", textTransform: "uppercase", color: "#71717a", fontFamily: "'DM Mono', monospace", marginBottom: 4 }}>Last Updated</div>
              <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 13, color: "#d4d4d8" }}>{formatPayDate(lastUpdated)}</div>
            </div>
          )}
        </div>

        <div className="dash-stats">
          <StatCard label="Gross YTD" value={fmt(totals.gross)} sub={`${paystubs.length} paystubs`} accent="#e4e4e7" />
          <StatCard label="Taxes / Other" value={fmt(taxesOther)} sub={totals.gross ? `${((taxesOther / totals.gross) * 100).toFixed(1)}% of gross` : ""} accent="#f87171" />
          <StatCard label="Net YTD" value={fmt(totals.net)} sub={totals.gross ? `${((totals.net / totals.gross) * 100).toFixed(1)}% take-home` : ""} accent="#22c55e" />
          <StatCard label="403(b) YTD" value={fmt(totals.r403b)} sub={totals.gross ? `${((totals.r403b / totals.gross) * 100).toFixed(1)}% of gross` : ""} accent="#a78bfa" />
        </div>

        <div className="dash-pie-grid">
          <div style={{
            background: "linear-gradient(180deg, #18181b 0%, #09090b 100%)",
            border: "1px solid #27272a", borderRadius: 16, padding: 28,
          }}>
            <div style={{ fontSize: 10, letterSpacing: "0.16em", textTransform: "uppercase", color: "#a1a1aa", marginBottom: 24 }}>Income Split</div>
            <PieChart data={pieData} size={240} />
          </div>
          <div className="dash-employers">
            {orderedEmployers.map((emp) => (
              <EmployerCard key={emp} employer={emp} stats={totals.byEmployer[emp]} />
            ))}
          </div>
        </div>

        {projection && (
          <div style={{ marginBottom: 32 }}>
            <ProjectionCard ytdGross={totals.gross} projection={projection} />
          </div>
        )}

        <div style={{ marginBottom: 32 }}>
          <MonthlyChart paystubs={paystubs} projection={projection} year={year} />
        </div>

        <PaystubSection paystubs={paystubs} orderedEmployers={orderedEmployers} loaded={loaded} />


      </div>
    </div>
  );
}

/* ─── App shell ─── */

function App() {
  const [view, setView] = useState(() => {
    if (typeof window === "undefined") return "calc";
    return window.localStorage.getItem("view") || "calc";
  });
  const changeView = (v) => {
    setView(v);
    try { window.localStorage.setItem("view", v); } catch (e) {}
  };
  return (
    <div style={{
      minHeight: "100vh",
      background: "#09090b",
      color: "#fff",
      paddingTop: "env(safe-area-inset-top)",
      paddingBottom: "env(safe-area-inset-bottom)",
    }}>
      <style>{`
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
        input[type=number] { -moz-appearance: textfield; }
        input::placeholder { color: #52525b; }
      `}</style>
      <TabBar view={view} setView={changeView} />
      {view === "dash" ? <Dashboard /> : <Calc />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
